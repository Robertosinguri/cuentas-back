name: Deploy Cuentas-Back API (Asustor NAS via Cloudflare Tunnel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Generar serviceAccountKey.json
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json

    - name: Instalar Cloudflared
      run: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Configurar Túnel SSH con Cloudflare Access
      run: |
        mkdir -p ~/.ssh
        cat <<EOF > ~/.ssh/config
        Host ${{ secrets.SERVER_HOST }}
          HostName ${{ secrets.SERVER_HOST }}
          User roberto
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          ProxyCommand /usr/bin/cloudflared access ssh --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
        EOF
        chmod 600 ~/.ssh/config

    - name: Instalar sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Transferir archivos al Servidor (RSYNC)
      run: |
        echo "🚀 Sincronizando archivos con el NAS (excluyendo .git)..."
        sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude '.git' --exclude 'venv' --exclude '__pycache__' ./ ${{ secrets.SERVER_HOST }}:/mnt/asustor_data/25-DOCKER/cuentas-back/

    - name: Reconstruir y levantar el contenedor Docker
      run: |
        echo "🚀 Iniciando despliegue Docker en el NAS..."
        sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh ${{ secrets.SERVER_HOST }} "bash -s" << 'EOF'
          set -e
          cd /mnt/asustor_data/25-DOCKER/cuentas-back
          echo "🛑 Deteniendo contenedor antiguo..."
          docker compose down || true
          echo "🏗️ Construyendo y levantando nueva versión..."
          docker compose up --build -d
          echo "🧹 Limpiando imágenes obsoletas..."
          docker image prune -f
          echo "✅ Despliegue completado con éxito."
          docker ps | grep cuentas-back
        EOF
